name: Build and Release BugJS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

permissions:
  contents: write  # Necesario para crear releases

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Build with Maven
      run: mvn clean package -DskipTests
      
    - name: Get version and commit info
      id: get_version
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Create Release and Upload JAR
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ github.run_number }}-${{ env.SHORT_SHA }}
        name: BugJS ${{ env.VERSION }} - Build ${{ github.run_number }}
        body: |
          ## BugJS Burp Suite Extension v${{ env.VERSION }}
          
          **Commit:** ${{ github.sha }}  
          **Fecha:** ${{ github.event.head_commit.timestamp }}  
          **Autor:** ${{ github.event.head_commit.author.name }}
          
          ### Instalación
          1. Descarga el archivo `bugjs-${{ env.VERSION }}.jar` abajo 👇
          2. En Burp Suite: **Extensions → Installed → Add**
          3. Selecciona **Extension type: Java**
          4. Carga el JAR descargado
          
          ### Características
          - 🔴 Detección automática de 50+ tipos de secretos (API keys, tokens, credenciales)
          - 🌐 Extracción de endpoints y APIs
          - 📊 Exportación de reportes JSON
          - 🔍 Filtros personalizados
          - 🗺️ Soporte para Source Maps
          
          ### Requisitos
          - Java 17+
          - Burp Suite (cualquier edición con API Montoya)
          
          ### Mensaje del commit
          ${{ github.event.head_commit.message }}
        draft: false
        prerelease: false
        files: |
          target/bugjs-${{ env.VERSION }}-jar-with-dependencies.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
